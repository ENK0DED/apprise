[package]
name = "apprise"
version = "1.9.8"
edition = "2021"
description = "Push notifications that work with everything - single Rust binary"
license = "MIT"

[[bin]]
name = "apprise"
path = "src/main.rs"

[dependencies]
# CLI parsing
clap = { version = "4", features = ["derive", "env", "string", "cargo"] }

# Async runtime
tokio = { version = "1", features = ["full"] }

# HTTP client
reqwest = { version = "0.12", default-features = false, features = ["json", "multipart", "stream", "rustls-tls"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"

# URL parsing
url = "2"

# Email
lettre = { version = "0.11", default-features = false, features = ["smtp-transport", "tokio1", "tokio1-rustls-tls", "builder"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

# Error handling
anyhow = "1"
thiserror = "2"

# Encoding
base64 = "0.22"

# MIME types
mime_guess = "2"

# System paths
dirs = "5"

# Random
rand = "0.8"

# Time
chrono = { version = "0.4", features = ["serde"] }

# Async trait
async-trait = "0.1"

# Lazy initialization
once_cell = "1"

# Regex
regex = "1"

# URL / percent encoding
urlencoding = "2"
percent-encoding = "2"

# MQTT
rumqttc = { version = "0.24", features = ["use-rustls"] }

# Cryptographic primitives (AWS Signature v4, OAuth1)
hmac = "0.12"
sha2 = "0.10"
sha1 = "0.10"
hex = "0.4"

# Desktop notifications (optional, feature-gated)
notify-rust = { version = "4", optional = true }

[features]
default = []
desktop = ["notify-rust"]

[profile.release]
opt-level = 3
strip = true
lto = true
codegen-units = 1
panic = "abort"
